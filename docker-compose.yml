services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_HOST: db
      DATABASE_NAME: jitterbit
      DATABASE_PORT: 5432
      DATABASE_PASS: postgres
      DATABASE_USER: postgres
      JWT_SECRET:    segredo
    ports:
      - '3000:3000'
    networks:
      - net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jitterbit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - net
volumes:
  data:
    driver: local

networks:
  net:
    driver: bridge
